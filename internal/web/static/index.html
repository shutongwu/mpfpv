<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mpfpv</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', 'SF Pro', -apple-system, sans-serif;
  background: #0d1117; color: #c9d1d9;
  padding: 20px; max-width: 900px; margin: 0 auto;
  font-size: 14px; line-height: 1.5;
}
h1 { font-size: 20px; margin-bottom: 16px; color: #58a6ff; }
h2 { font-size: 16px; margin: 20px 0 10px; color: #8b949e; text-transform: uppercase; letter-spacing: 1px; }

.card {
  background: #161b22; border: 1px solid #30363d; border-radius: 6px;
  padding: 16px; margin-bottom: 16px;
}
.card-row { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 8px; }
.card-item { flex: 1; min-width: 120px; }
.card-label { font-size: 11px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; }
.card-value { font-size: 16px; font-weight: 600; color: #e6edf3; margin-top: 2px; }

.badge {
  display: inline-block; padding: 2px 8px; border-radius: 12px;
  font-size: 12px; font-weight: 600;
}
.badge-green { background: #0d4429; color: #3fb950; }
.badge-red { background: #4a1525; color: #f85149; }
.badge-yellow { background: #3d2e00; color: #d29922; }
.badge-blue { background: #0c2d6b; color: #58a6ff; }
.badge-gray { background: #21262d; color: #8b949e; }

table { width: 100%; border-collapse: collapse; }
th { text-align: left; padding: 8px 12px; border-bottom: 2px solid #30363d; color: #8b949e; font-size: 12px; text-transform: uppercase; }
td { padding: 8px 12px; border-bottom: 1px solid #21262d; }
tr:hover td { background: #1c2128; }
tr.expanded td { background: #1c2128; border-bottom: none; }

.detail-row td { background: #1c2128; padding: 4px 12px 12px 40px; }
.detail-row table { margin-top: 4px; }
.detail-row th { font-size: 11px; border-bottom: 1px solid #30363d; }
.detail-row td { padding: 4px 8px; border-bottom: 1px solid #21262d; }

button {
  background: #21262d; color: #c9d1d9; border: 1px solid #30363d;
  padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 12px;
}
button:hover { background: #30363d; border-color: #8b949e; }
button.active { background: #1f6feb; border-color: #1f6feb; color: #fff; }
button.danger { color: #f85149; }
button.danger:hover { background: #4a1525; border-color: #f85149; }

.btn-group { display: inline-flex; gap: 0; }
.btn-group button { border-radius: 0; margin-left: -1px; }
.btn-group button:first-child { border-radius: 4px 0 0 4px; margin-left: 0; }
.btn-group button:last-child { border-radius: 0 4px 4px 0; }

.loading { color: #8b949e; font-style: italic; }
.error-msg { color: #f85149; }
.active-marker { color: #3fb950; font-weight: bold; }
#mode-label { font-size: 12px; color: #8b949e; margin-left: 8px; }

/* --- GUI-specific styles --- */
.connect-bar {
  display: flex; align-items: center; gap: 16px;
  margin-bottom: 16px; padding: 16px;
  background: #161b22; border: 1px solid #30363d; border-radius: 6px;
}
.connect-btn {
  padding: 10px 32px; font-size: 16px; font-weight: 600; border-radius: 6px;
  min-width: 140px; text-align: center;
}
.connect-btn.connect {
  background: #238636; border-color: #2ea043; color: #fff;
}
.connect-btn.connect:hover { background: #2ea043; }
.connect-btn.disconnect {
  background: #da3633; border-color: #f85149; color: #fff;
}
.connect-btn.disconnect:hover { background: #b62324; }
.connect-btn:disabled {
  opacity: 0.5; cursor: not-allowed;
}
.connect-status {
  font-size: 14px; flex: 1;
}

.config-section {
  margin-bottom: 16px;
}
.config-toggle {
  cursor: pointer; user-select: none; color: #58a6ff; font-size: 14px;
  display: flex; align-items: center; gap: 6px; margin-bottom: 8px;
}
.config-toggle:hover { text-decoration: underline; }
.config-body { display: none; }
.config-body.open { display: block; }

.form-group {
  margin-bottom: 12px;
}
.form-group label {
  display: block; font-size: 12px; color: #8b949e; margin-bottom: 4px;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.form-group input, .form-group select {
  width: 100%; padding: 8px 10px; font-size: 14px;
  background: #0d1117; color: #e6edf3;
  border: 1px solid #30363d; border-radius: 4px;
}
.form-group input:focus, .form-group select:focus {
  outline: none; border-color: #58a6ff;
}
.form-row { display: flex; gap: 16px; }
.form-row .form-group { flex: 1; }

.save-btn {
  background: #1f6feb; border-color: #1f6feb; color: #fff;
  padding: 8px 24px; font-size: 14px; font-weight: 600;
}
.save-btn:hover { background: #388bfd; }
.save-msg {
  display: inline-block; margin-left: 12px; font-size: 12px;
}
.save-msg.ok { color: #3fb950; }
.save-msg.err { color: #f85149; }
</style>
</head>
<body>

<h1>mpfpv <span id="mode-label"></span></h1>
<div id="app"><span class="loading">Detecting mode...</span></div>

<script>
(function() {
  'use strict';

  var mode = null;
  var guiMode = false; // true when GUI controller APIs are available
  var expandedClient = null;
  var pollTimer = null;
  var configOpen = false;

  function detectMode() {
    // First, check if GUI controller is available.
    fetch('/api/connection-status').then(function(res) {
      if (res.ok) {
        guiMode = true;
        mode = 'client';
        document.getElementById('mode-label').textContent = '(client)';
        render();
        startPolling();
        return;
      }
      // Not GUI mode, fall back to normal detection.
      detectNormalMode();
    }).catch(function() {
      detectNormalMode();
    });
  }

  function detectNormalMode() {
    fetch('/api/status').then(function(res) {
      if (res.ok) { mode = 'client'; }
      else { mode = 'server'; }
      document.getElementById('mode-label').textContent = '(' + mode + ')';
      render();
      startPolling();
    }).catch(function() {
      mode = 'server';
      document.getElementById('mode-label').textContent = '(server)';
      render();
      startPolling();
    });
  }

  function startPolling() {
    if (pollTimer) clearInterval(pollTimer);
    pollTimer = setInterval(doRefresh, 2000);
    doRefresh();
  }

  function doRefresh() {
    if (mode === 'client') {
      if (guiMode) refreshGUIClient();
      else refreshClient();
    } else {
      refreshServer();
    }
  }

  // --- GUI Client mode (with connect/disconnect/config) ---

  function refreshGUIClient() {
    Promise.all([
      fetch('/api/status').then(function(r) { return r.json(); }),
      fetch('/api/interfaces').then(function(r) { return r.json(); }),
      fetch('/api/connection-status').then(function(r) { return r.json(); })
    ]).then(function(results) {
      renderGUIClient(results[0], results[1], results[2]);
    }).catch(function(e) {
      document.getElementById('app').innerHTML = '<p class="error-msg">Failed to fetch status: ' + esc(e.message) + '</p>';
    });
  }

  function renderGUIClient(status, ifaces, connStatus) {
    var isConn = connStatus.connected;
    var html = '';

    // --- Connection control bar ---
    html += '<div class="connect-bar">';
    if (isConn) {
      html += '<button class="connect-btn disconnect" onclick="mpfpv.disconnect()">Disconnect</button>';
      html += '<div class="connect-status">';
      if (status.connected) {
        html += '<span class="badge badge-green">Connected</span>';
        html += ' &nbsp; Virtual IP: <strong>' + esc(status.virtualIP || '-') + '</strong>';
        html += ' &nbsp; Client ID: <strong>' + status.clientID + '</strong>';
      } else {
        html += '<span class="badge badge-yellow">Connecting...</span>';
      }
      html += '</div>';
    } else {
      html += '<button class="connect-btn connect" onclick="mpfpv.connect()">Connect</button>';
      html += '<div class="connect-status">';
      html += '<span class="badge badge-gray">Disconnected</span>';
      if (connStatus.error) {
        html += ' <span class="error-msg">' + esc(connStatus.error) + '</span>';
      }
      html += '</div>';
    }
    html += '</div>';

    // --- Config section (collapsible) ---
    html += '<div class="config-section">';
    html += '<div class="config-toggle" onclick="mpfpv.toggleConfig()">';
    html += (configOpen ? '&#9660;' : '&#9654;') + ' Configuration';
    html += '</div>';
    html += '<div class="config-body' + (configOpen ? ' open' : '') + '" id="config-body">';
    html += renderConfigForm();
    html += '</div></div>';

    // --- Status area (only when connected) ---
    if (isConn) {
      // Send mode control
      html += '<div class="card">';
      html += '<div class="card-row">';
      html += '<div class="card-item"><div class="card-label">Send Mode</div><div class="card-value">';
      html += '<div class="btn-group">';
      html += '<button class="' + (status.sendMode === 'redundant' ? 'active' : '') + '" onclick="mpfpv.setSendMode(\'redundant\')">Redundant</button>';
      html += '<button class="' + (status.sendMode === 'failover' ? 'active' : '') + '" onclick="mpfpv.setSendMode(\'failover\')">Failover</button>';
      html += '</div></div></div>';
      html += '</div></div>';

      // Interfaces table
      html += '<h2>Interfaces</h2>';
      if (!ifaces || ifaces.length === 0) {
        html += '<div class="card"><span class="loading">No interfaces (single socket mode)</span></div>';
      } else {
        html += '<div class="card"><table><thead><tr>';
        html += '<th>Name</th><th>Local IP</th><th>Status</th><th>RTT</th><th>Active</th><th></th>';
        html += '</tr></thead><tbody>';
        for (var i = 0; i < ifaces.length; i++) {
          var iface = ifaces[i];
          var statusBadge = iface.status === 'active'
            ? '<span class="badge badge-green">active</span>'
            : iface.status === 'suspect'
              ? '<span class="badge badge-yellow">suspect</span>'
              : '<span class="badge badge-red">down</span>';
          var activeMark = iface.isActive ? '<span class="active-marker">&#9679;</span>' : '';
          html += '<tr>';
          html += '<td>' + esc(iface.name) + '</td>';
          html += '<td>' + esc(iface.localIP) + '</td>';
          html += '<td>' + statusBadge + '</td>';
          html += '<td>' + esc(iface.rtt) + '</td>';
          html += '<td>' + activeMark + '</td>';
          html += '<td><button onclick="mpfpv.toggleIface(\'' + esc(iface.name) + '\')">Toggle</button></td>';
          html += '</tr>';
        }
        html += '</tbody></table></div>';
      }
    }

    document.getElementById('app').innerHTML = html;

    // Restore config form values if config panel is open.
    if (configOpen) {
      loadConfigValues();
    }
  }

  function renderConfigForm() {
    var html = '<div class="card">';
    html += '<div class="form-row">';
    html += '<div class="form-group"><label>Server Address</label>';
    html += '<input type="text" id="cfg-server" placeholder="203.0.113.1:9800"></div>';
    html += '<div class="form-group"><label>Team Key</label>';
    html += '<input type="text" id="cfg-teamkey" placeholder="my-team-key"></div>';
    html += '</div>';
    html += '<div style="margin-top:8px">';
    html += '<button class="save-btn" onclick="mpfpv.saveConfig()">Save</button>';
    html += '<span class="save-msg" id="save-msg"></span>';
    html += '</div>';
    html += '</div>';
    return html;
  }

  var cachedConfig = null;

  function loadConfigValues() {
    if (cachedConfig) {
      applyConfigToForm(cachedConfig);
      return;
    }
    fetch('/api/config').then(function(r) { return r.json(); }).then(function(cfg) {
      cachedConfig = cfg;
      applyConfigToForm(cfg);
    }).catch(function() {});
  }

  function applyConfigToForm(cfg) {
    var el;
    el = document.getElementById('cfg-server');
    if (el && !el._userEdited) el.value = (cfg.client && cfg.client.serverAddr) || '';
    el = document.getElementById('cfg-teamkey');
    if (el && !el._userEdited) el.value = cfg.teamKey || '';

    // Mark inputs so we don't overwrite user edits on refresh.
    var inputs = document.querySelectorAll('#config-body input');
    for (var i = 0; i < inputs.length; i++) {
      inputs[i].addEventListener('input', function() { this._userEdited = true; });
    }
  }

  // --- Normal client mode (no GUI controller) ---

  function refreshClient() {
    Promise.all([
      fetch('/api/status').then(function(r) { return r.json(); }),
      fetch('/api/interfaces').then(function(r) { return r.json(); })
    ]).then(function(results) {
      renderClient(results[0], results[1]);
    }).catch(function(e) {
      document.getElementById('app').innerHTML = '<p class="error-msg">Failed to fetch status: ' + esc(e.message) + '</p>';
    });
  }

  function renderClient(status, ifaces) {
    var connBadge = status.connected
      ? '<span class="badge badge-green">Connected</span>'
      : '<span class="badge badge-red">Disconnected</span>';

    var html = '<div class="card">';
    html += '<div class="card-row">';
    html += '<div class="card-item"><div class="card-label">Status</div><div class="card-value">' + connBadge + '</div></div>';
    html += '<div class="card-item"><div class="card-label">Virtual IP</div><div class="card-value">' + esc(status.virtualIP || '-') + '</div></div>';
    html += '<div class="card-item"><div class="card-label">Client ID</div><div class="card-value">' + status.clientID + '</div></div>';
    html += '</div>';
    html += '<div class="card-row">';
    html += '<div class="card-item"><div class="card-label">Send Mode</div><div class="card-value">';
    html += '<div class="btn-group">';
    html += '<button class="' + (status.sendMode === 'redundant' ? 'active' : '') + '" onclick="mpfpv.setSendMode(\'redundant\')">Redundant</button>';
    html += '<button class="' + (status.sendMode === 'failover' ? 'active' : '') + '" onclick="mpfpv.setSendMode(\'failover\')">Failover</button>';
    html += '</div></div></div>';
    html += '</div></div>';

    html += '<h2>Interfaces</h2>';
    if (!ifaces || ifaces.length === 0) {
      html += '<div class="card"><span class="loading">No interfaces (single socket mode)</span></div>';
    } else {
      html += '<div class="card"><table><thead><tr>';
      html += '<th>Name</th><th>Local IP</th><th>Status</th><th>RTT</th><th>Active</th><th></th>';
      html += '</tr></thead><tbody>';
      for (var i = 0; i < ifaces.length; i++) {
        var iface = ifaces[i];
        var statusBadge = iface.status === 'active'
          ? '<span class="badge badge-green">active</span>'
          : iface.status === 'suspect'
            ? '<span class="badge badge-yellow">suspect</span>'
            : '<span class="badge badge-red">down</span>';
        var activeMark = iface.isActive ? '<span class="active-marker">&#9679;</span>' : '';
        html += '<tr>';
        html += '<td>' + esc(iface.name) + '</td>';
        html += '<td>' + esc(iface.localIP) + '</td>';
        html += '<td>' + statusBadge + '</td>';
        html += '<td>' + esc(iface.rtt) + '</td>';
        html += '<td>' + activeMark + '</td>';
        html += '<td><button onclick="mpfpv.toggleIface(\'' + esc(iface.name) + '\')">Toggle</button></td>';
        html += '</tr>';
      }
      html += '</tbody></table></div>';
    }

    document.getElementById('app').innerHTML = html;
  }

  // --- Server mode ---

  function refreshServer() {
    Promise.all([
      fetch('/api/clients').then(function(r) { return r.json(); }),
      fetch('/api/routes').then(function(r) { return r.json(); })
    ]).then(function(results) {
      renderServer(results[0], results[1]);
    }).catch(function(e) {
      document.getElementById('app').innerHTML = '<p class="error-msg">Failed to fetch data: ' + esc(e.message) + '</p>';
    });
  }

  function renderServer(clients, routes) {
    var html = '<h2>Clients</h2><div class="card">';
    if (!clients || clients.length === 0) {
      html += '<span class="loading">No clients connected</span>';
    } else {
      html += '<table><thead><tr>';
      html += '<th>Client ID</th><th>Virtual IP</th><th>Send Mode</th><th>Status</th><th>Addrs</th><th>Last Seen</th><th></th>';
      html += '</tr></thead><tbody>';
      for (var i = 0; i < clients.length; i++) {
        var c = clients[i];
        var statusBadge = c.online
          ? '<span class="badge badge-green">online</span>'
          : '<span class="badge badge-red">offline</span>';
        var isExpanded = expandedClient === c.clientID;
        html += '<tr class="' + (isExpanded ? 'expanded' : '') + '" style="cursor:pointer" onclick="mpfpv.toggleClient(' + c.clientID + ')">';
        html += '<td>' + c.clientID + '</td>';
        html += '<td>' + esc(c.virtualIP) + '</td>';
        html += '<td><span class="badge badge-blue">' + esc(c.sendMode) + '</span></td>';
        html += '<td>' + statusBadge + '</td>';
        html += '<td>' + c.addrCount + '</td>';
        html += '<td>' + formatTime(c.lastSeen) + '</td>';
        html += '<td><button class="danger" onclick="event.stopPropagation(); mpfpv.deleteClient(' + c.clientID + ')">Delete</button></td>';
        html += '</tr>';
        if (isExpanded) {
          html += '<tr class="detail-row"><td colspan="7" id="detail-' + c.clientID + '"><span class="loading">Loading...</span></td></tr>';
        }
      }
      html += '</tbody></table>';
    }
    html += '</div>';

    html += '<h2>Route Table</h2><div class="card">';
    if (!routes || routes.length === 0) {
      html += '<span class="loading">No routes</span>';
    } else {
      html += '<table><thead><tr><th>Virtual IP</th><th>Client ID</th></tr></thead><tbody>';
      for (var j = 0; j < routes.length; j++) {
        var r = routes[j];
        html += '<tr><td>' + esc(r.virtualIP) + '</td><td>' + r.clientID + '</td></tr>';
      }
      html += '</tbody></table>';
    }
    html += '</div>';

    document.getElementById('app').innerHTML = html;

    if (expandedClient !== null) {
      loadClientDetail(expandedClient);
    }
  }

  function loadClientDetail(id) {
    var el = document.getElementById('detail-' + id);
    if (!el) return;
    fetch('/api/clients/' + id).then(function(res) {
      if (!res.ok) { el.innerHTML = '<span class="error-msg">Not found</span>'; return; }
      return res.json();
    }).then(function(detail) {
      if (!detail) return;
      var h = '<strong>Source Addresses</strong>';
      if (!detail.addrs || detail.addrs.length === 0) {
        h += '<p class="loading">No addresses</p>';
      } else {
        h += '<table><thead><tr><th>Address</th><th>Last Seen</th></tr></thead><tbody>';
        for (var k = 0; k < detail.addrs.length; k++) {
          var a = detail.addrs[k];
          h += '<tr><td>' + esc(a.addr) + '</td><td>' + formatTime(a.lastSeen) + '</td></tr>';
        }
        h += '</tbody></table>';
      }
      el.innerHTML = h;
    }).catch(function(e) {
      el.innerHTML = '<span class="error-msg">Error: ' + esc(e.message) + '</span>';
    });
  }

  // --- Exposed actions ---
  window.mpfpv = {
    setSendMode: function(m) {
      fetch('/api/sendmode', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ mode: m })
      }).then(function() { doRefresh(); }).catch(function(e) { alert('Failed: ' + e.message); });
    },
    toggleIface: function(name) {
      fetch('/api/interfaces/' + encodeURIComponent(name) + '/disable', { method: 'POST' })
        .then(function(res) {
          if (!res.ok) return fetch('/api/interfaces/' + encodeURIComponent(name) + '/enable', { method: 'POST' });
        })
        .then(function() { doRefresh(); })
        .catch(function(e) { alert('Failed: ' + e.message); });
    },
    toggleClient: function(id) {
      expandedClient = expandedClient === id ? null : id;
      doRefresh();
    },
    deleteClient: function(id) {
      if (!confirm('Delete client ' + id + '? This will release its IP allocation.')) return;
      fetch('/api/clients/' + id, { method: 'DELETE' })
        .then(function() { if (expandedClient === id) expandedClient = null; doRefresh(); })
        .catch(function(e) { alert('Failed: ' + e.message); });
    },

    // --- GUI-specific actions ---
    connect: function() {
      fetch('/api/connect', { method: 'POST' })
        .then(function(res) {
          if (!res.ok) return res.text().then(function(t) { throw new Error(t); });
          doRefresh();
        })
        .catch(function(e) { alert('Connect failed: ' + e.message); });
    },
    disconnect: function() {
      fetch('/api/disconnect', { method: 'POST' })
        .then(function(res) {
          if (!res.ok) return res.text().then(function(t) { throw new Error(t); });
          doRefresh();
        })
        .catch(function(e) { alert('Disconnect failed: ' + e.message); });
    },
    toggleConfig: function() {
      configOpen = !configOpen;
      cachedConfig = null; // reload
      doRefresh();
    },
    saveConfig: function() {
      var serverAddr = document.getElementById('cfg-server').value.trim();
      var teamKey = document.getElementById('cfg-teamkey').value.trim();
      // Auto-generate clientID from cached config or random
      var clientID = (cachedConfig && cachedConfig.client && cachedConfig.client.clientID) || (Math.floor(Math.random() * 65534) + 1);

      var cfg = {
        mode: 'client',
        teamKey: teamKey,
        client: {
          clientID: clientID,
          serverAddr: serverAddr,
          sendMode: 'redundant',
          mtu: 1300,
          dedupWindow: 4096,
          excludedInterfaces: ['lo']
        }
      };

      var msgEl = document.getElementById('save-msg');
      fetch('/api/config', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(cfg)
      }).then(function(res) {
        if (!res.ok) return res.text().then(function(t) { throw new Error(t); });
        return res.json();
      }).then(function() {
        if (msgEl) { msgEl.textContent = 'Saved!'; msgEl.className = 'save-msg ok'; }
        cachedConfig = cfg;
        // Clear user-edited flags so next refresh fills values from saved config.
        var inputs = document.querySelectorAll('#config-body input, #config-body select');
        for (var i = 0; i < inputs.length; i++) { inputs[i]._userEdited = false; }
        setTimeout(function() { if (msgEl) msgEl.textContent = ''; }, 3000);
      }).catch(function(e) {
        if (msgEl) { msgEl.textContent = 'Error: ' + e.message; msgEl.className = 'save-msg err'; }
      });
    }
  };

  // --- Helpers ---
  function esc(s) {
    if (s == null) return '';
    var d = document.createElement('div');
    d.textContent = String(s);
    return d.innerHTML;
  }

  function formatTime(iso) {
    if (!iso) return '-';
    try {
      var d = new Date(iso);
      var now = new Date();
      var diff = Math.floor((now - d) / 1000);
      if (diff < 5) return 'just now';
      if (diff < 60) return diff + 's ago';
      if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
      return d.toLocaleTimeString();
    } catch (e) { return iso; }
  }

  function render() {
    document.getElementById('app').innerHTML = '<span class="loading">Loading...</span>';
  }

  detectMode();
})();
</script>
